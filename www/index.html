<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Procedural Island by Gece</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100vh; overflow: hidden;
            background: rgb(5, 10, 15);
        }
        canvas { display: block; width: 100vw; height: 100vh; outline: none; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.7); font-family: 'Helvetica Neue', sans-serif; 
            text-transform: uppercase; letter-spacing: 4px; font-size: 12px;
            pointer-events: none; transition: opacity 1.5s ease;
        }
    </style>

    <!-- Import Map -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Ada İnşa Ediliyor...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let camera, scene, renderer, controls, water, sun, dirLight;
        let composer, particles; 
        
        const textureLoader = new THREE.TextureLoader();

        init();

        function init() {
            // 1. Render Kurulumu
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.55;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x99bbdd, 0.0025); 

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 10000);
            camera.position.set(60, 25, 80);

            // 2. Işıklandırma
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x445566, 0.5); 
            scene.add(hemiLight);

            sun = new THREE.Vector3();
            dirLight = new THREE.DirectionalLight(0xffeebb, 1.8); 
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 300;
            const d = 100;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            // 3. Su (Daha derin ve yansıtıcı)
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(
                waterGeometry,
                {
                    textureWidth: 512, textureHeight: 512,
                    waterNormals: textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/waternormals.jpg', function (tex) {
                        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                    }),
                    sunDirection: new THREE.Vector3(),
                    sunColor: 0xffaa66,
                    waterColor: 0x003344,
                    distortionScale: 2.5,
                    fog: true
                }
            );
            water.rotation.x = -Math.PI / 2;
            water.material.transparent = true;
            water.material.uniforms['alpha'].value = 0.92;
            scene.add(water);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({color: 0x000a14}));
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -50;
            scene.add(floor);

            // 4. Gökyüzü ve Atmosfer
            const sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);
            const skyUniforms = sky.material.uniforms;
            skyUniforms['turbidity'].value = 6;
            skyUniforms['rayleigh'].value = 1.2;
            skyUniforms['mieCoefficient'].value = 0.005;
            skyUniforms['mieDirectionalG'].value = 0.8;

            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            const parameters = { elevation: 10, azimuth: -120 }; // Sabah/İkindi güneşi açısı

            function updateSun() {
                const phi = THREE.MathUtils.degToRad(90 - parameters.elevation);
                const theta = THREE.MathUtils.degToRad(parameters.azimuth);
                sun.setFromSphericalCoords(1, phi, theta);
                sky.material.uniforms['sunPosition'].value.copy(sun);
                water.material.uniforms['sunDirection'].value.copy(sun).normalize();
                dirLight.position.copy(sun).multiplyScalar(100);
                scene.environment = pmremGenerator.fromScene(sky).texture;
            }
            updateSun();

            // 5. ADA VE DOĞA OLUŞTURMA
            createProceduralIsland();
            createParticles();

            // 6. Post-Processing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.4, 0.9);
            const outputPass = new OutputPass();

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(outputPass);

            // 7. Kontroller
            controls = new OrbitControls(camera, renderer.domElement);
            controls.maxPolarAngle = Math.PI * 0.48;
            controls.target.set(0, 8, 0);
            controls.minDistance = 15.0;
            controls.maxDistance = 200.0;
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            window.addEventListener('resize', onWindowResize);
            setTimeout(() => { document.getElementById('loading').style.opacity = 0; }, 800);

            animate();
        }

        // Basit gürültü fonksiyonu (Adayı şekillendirmek için)
        function noise(x, z) {
            let n = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 8;
            n += Math.sin(x * 0.1 + z * 0.1) * 4;
            n += Math.cos(x * 0.2 - z * 0.15) * 2;
            n += Math.sin(x * 0.4) * 0.5;
            return n;
        }

        function createProceduralIsland() {
            const islandGroup = new THREE.Group();
            
            // Ada Geometrisi (Detaylı bir düzlem kullanıp şekillendiriyoruz)
            const gridSize = 120;
            const segments = 150;
            const geo = new THREE.PlaneGeometry(gridSize, gridSize, segments, segments);
            geo.rotateX(-Math.PI / 2);

            const posAttribute = geo.attributes.position;
            const colors = [];
            
            const colorSand = new THREE.Color(0xd4c0a1);
            const colorGrass = new THREE.Color(0x4a6b4a);
            const colorRock = new THREE.Color(0x666666);
            const colorDarkRock = new THREE.Color(0x444444);

            // Yükseklik haritası ve renk ataması
            for (let i = 0; i < posAttribute.count; i++) {
                const x = posAttribute.getX(i);
                const z = posAttribute.getZ(i);
                
                // Merkeze olan uzaklık (Adayı yuvarlağımsı yapmak için)
                const distanceToCenter = Math.sqrt(x * x + z * z);
                const maxRadius = 55;
                
                let y = -5; // Su altı taban seviyesi

                if (distanceToCenter < maxRadius) {
                    // Ana şekil
                    let h = noise(x, z);
                    
                    // Kenarlara doğru yumuşak düşüş (Falloff)
                    const falloff = 1 - Math.pow(distanceToCenter / maxRadius, 2);
                    y = (h + 5) * falloff - 1; // Yüksekliği falloff ile çarpıp genel seviyeyi ayarla
                }

                posAttribute.setY(i, y);

                // Yüksekliğe göre renk atama (Kum -> Çimen -> Kaya)
                if (y < 0.5) {
                    colors.push(colorSand.r, colorSand.g, colorSand.b);
                } else if (y < 6) {
                    // Hafif renk varyasyonu ile çimen
                    const rVar = (Math.random() - 0.5) * 0.05;
                    colors.push(colorGrass.r + rVar, colorGrass.g + rVar, colorGrass.b + rVar);
                } else if (y < 10) {
                    colors.push(colorRock.r, colorRock.g, colorRock.b);
                } else {
                    colors.push(colorDarkRock.r, colorDarkRock.g, colorDarkRock.b);
                }
            }

            geo.computeVertexNormals(); // Işıkların doğru hesaplanması için normalleri yenile
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            // Vertex renklerini kullanan materyal
            const islandMat = new THREE.MeshStandardMaterial({ 
                vertexColors: true, 
                roughness: 0.85, 
                flatShading: true // Low-poly / keskin estetik için
            });

            const islandMesh = new THREE.Mesh(geo, islandMat);
            islandMesh.castShadow = true;
            islandMesh.receiveShadow = true;
            islandGroup.add(islandMesh);

            // Ağaçları Yerleştir
            const treePositions = [];
            for (let i = 0; i < posAttribute.count; i += 25) { // Her 25 vertex'te bir ağaç denemesi
                const x = posAttribute.getX(i);
                const y = posAttribute.getY(i);
                const z = posAttribute.getZ(i);

                // Ağaçlar sadece çimenlik alanda (yüksekliği 1 ile 6 arası olan yerler)
                if (y > 1.5 && y < 6 && Math.random() > 0.4) {
                    // Çok yakın ağaçları engelle
                    let tooClose = false;
                    for (let p of treePositions) {
                        if (Math.hypot(p.x - x, p.z - z) < 3) tooClose = true;
                    }

                    if (!tooClose) {
                        treePositions.push({x, y, z});
                        const scale = 0.6 + Math.random() * 0.6;
                        createDetailedPineTree(islandGroup, x, y, z, scale);
                    }
                }
            }

            // Kıyılara birkaç detay kaya
            const rockGeo = new THREE.DodecahedronGeometry(1, 1);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
            for(let i=0; i<30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = 45 + Math.random() * 8; // Kıyı şeridi yarıçapı
                const rx = Math.cos(angle) * r;
                const rz = Math.sin(angle) * r;
                const ry = noise(rx, rz) * (1 - Math.pow(r/55, 2)) - 0.5;

                if(ry > -1 && ry < 1) { // Sadece su seviyesine yakın olanları ekle
                    const rock = new THREE.Mesh(rockGeo, rockMat);
                    rock.position.set(rx, ry, rz);
                    rock.scale.set(1+Math.random()*2, 1+Math.random(), 1+Math.random()*2);
                    rock.rotation.set(Math.random(), Math.random(), Math.random());
                    rock.castShadow = true; rock.receiveShadow = true;
                    islandGroup.add(rock);
                }
            }

            scene.add(islandGroup);
        }

        function createDetailedPineTree(parent, x, y, z, scale) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 1.0 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 3), trunkMat);
            trunk.position.set(x, y + 1.5, z);
            
            // Ağaçları hafif eğimli yap (Araziye uyum hissi)
            trunk.rotation.x = (Math.random() - 0.5) * 0.15;
            trunk.rotation.z = (Math.random() - 0.5) * 0.15;
            
            trunk.scale.setScalar(scale);
            trunk.castShadow = true; trunk.receiveShadow = true;
            parent.add(trunk);

            // Çam yaprakları (Daha koyu yeşil)
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x243b24, roughness: 0.9, flatShading: true });
            
            for(let i=0; i<4; i++) { // 4 Katmanlı yaprak
                const radius = 2.0 - (i * 0.4);
                const height = 3.5 - (i * 0.4);
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(radius, height, 6), leavesMat);
                leaves.position.set(x, y + 2.5 + (i * 1.5)*scale, z);
                
                // Yaprakları da gövde ile aynı açıda eğ
                leaves.rotation.x = trunk.rotation.x;
                leaves.rotation.z = trunk.rotation.z;
                // Her katmanı kendi etrafında hafif döndür ki organik dursun
                leaves.rotation.y = Math.random() * Math.PI;

                leaves.scale.setScalar(scale);
                leaves.castShadow = true; leaves.receiveShadow = true;
                parent.add(leaves);
            }
        }

        function createParticles() {
            const particleCount = 200;
            const particleGeo = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);

            for(let i=0; i<particleCount * 3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 100; 
                posArray[i+1] = Math.random() * 20; 
                posArray[i+2] = (Math.random() - 0.5) * 100;
            }

            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const particleMat = new THREE.PointsMaterial({
                size: 0.08,
                color: 0xffffff,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending 
            });

            particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            water.material.uniforms['time'].value += 1.0 / 100.0; // Yavaş dalgalar

            if(particles) {
                const positions = particles.geometry.attributes.position.array;
                for(let i=1; i<positions.length; i+=3) {
                    positions[i] += Math.sin(time * 0.5 + i) * 0.003; 
                    positions[i-1] += Math.cos(time * 0.2 + i) * 0.008; 
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
